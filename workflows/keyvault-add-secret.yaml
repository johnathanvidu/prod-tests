spec_version: 2
description: Add a new secret to an existing Azure Key Vault

workflow:
  scope: space

inputs:
  agent:
    type: agent

  keyvault_name:
    type: string
    description: "Name of the existing Azure Key Vault"

  secret_name:
    type: string
    description: "Name of the new secret to create"

  secret_value:
    type: string
    sensitive: true
    description: "Value for the new secret"

  content_type:
    type: string
    default: ""
    description: "Optional content type label for the secret (e.g. 'password', 'connection-string')"

grains:
  add-secret:
    kind: shell
    spec:
      agent:
        name: '{{ .inputs.agent }}'
      activities:
        deploy:
          commands:
            - name: set-secret
              command: |
                set -euo pipefail

                az login --federated-token "$(cat "${AZURE_FEDERATED_TOKEN_FILE}")" \
                  --service-principal \
                  --username "${AZURE_CLIENT_ID}" \
                  --tenant "${AZURE_TENANT_ID}" \
                  --output none

                CONTENT_TYPE_ARG=""
                if [ -n "${CONTENT_TYPE}" ]; then
                  CONTENT_TYPE_ARG="--description ${CONTENT_TYPE}"
                fi

                az keyvault secret set \
                  --vault-name "${KEYVAULT_NAME}" \
                  --name "${SECRET_NAME}" \
                  --value "${SECRET_VALUE}" \
                  ${CONTENT_TYPE_ARG} \
                  --output none

                echo "Secret '${SECRET_NAME}' successfully added to Key Vault '${KEYVAULT_NAME}'."
        destroy:
          commands:
            - name: noop
              command: echo "No teardown needed for workflow grain."
      env-vars:
        - KEYVAULT_NAME: '{{ .inputs.keyvault_name }}'
        - SECRET_NAME: '{{ .inputs.secret_name }}'
        - SECRET_VALUE: '{{ .inputs.secret_value }}'
        - CONTENT_TYPE: '{{ .inputs.content_type }}'
