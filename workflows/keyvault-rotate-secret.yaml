spec_version: 2
description: Rotate the password stored in an existing Azure Key Vault secret

workflow:
  scope: space

inputs:
  agent:
    type: agent
  keyvault_name:
    type: string
    description: "Name of the Azure Key Vault that contains the secret"
  secret_name:
    type: string
    description: "Name of the secret whose password should be rotated"
  new_password:
    type: string
    sensitive: true
    description: "The new password value to store as the latest secret version"
  disable_old_version:
    type: string
    default: "true"
    allowed-values:
      - "true"
      - "false"
    style: radio
    description: "Disable the previous secret version after rotation to prevent its use"

grains:
  rotate-secret:
    kind: shell
    spec:
      agent:
        name: '{{ .inputs.agent }}'
      activities:
        deploy:
          commands:
            - name: rotate
              command: |
                set -euo pipefail

                az login --federated-token "$(cat "${AZURE_FEDERATED_TOKEN_FILE}")" \
                  --service-principal \
                  --username "${AZURE_CLIENT_ID}" \
                  --tenant "${AZURE_TENANT_ID}" \
                  --output none

                # Capture the current (old) version ID before overwriting
                OLD_VERSION_ID=$(az keyvault secret show \
                  --vault-name "${KEYVAULT_NAME}" \
                  --name "${SECRET_NAME}" \
                  --query "id" \
                  --output tsv | awk -F'/' '{print $NF}')

                # Set new version
                az keyvault secret set \
                  --vault-name "${KEYVAULT_NAME}" \
                  --name "${SECRET_NAME}" \
                  --value "${NEW_PASSWORD}" \
                  --output none

                echo "New version of secret '${SECRET_NAME}' created in Key Vault '${KEYVAULT_NAME}'."

                # Optionally disable the old version
                if [ "${DISABLE_OLD_VERSION}" = "true" ] && [ -n "${OLD_VERSION_ID}" ]; then
                  az keyvault secret set-attributes \
                    --vault-name "${KEYVAULT_NAME}" \
                    --name "${SECRET_NAME}" \
                    --version "${OLD_VERSION_ID}" \
                    --enabled false \
                    --output none

                  echo "Old version '${OLD_VERSION_ID}' disabled."
                fi
        destroy:
          commands:
            - name: noop
              command: echo "No teardown needed for workflow grain."
      env-vars:
        - KEYVAULT_NAME: '{{ .inputs.keyvault_name }}'
        - SECRET_NAME: '{{ .inputs.secret_name }}'
        - NEW_PASSWORD: '{{ .inputs.new_password }}'
        - DISABLE_OLD_VERSION: '{{ .inputs.disable_old_version }}'
