spec_version: 2
description: Rotate the password stored in an existing Azure Key Vault secret

workflow:
  scope: space

inputs:
  agent:
    type: agent
  keyvault_name:
    type: string
    description: "Name of the Azure Key Vault that contains the secret"
  secret_name:
    type: string
    description: "Name of the secret whose password should be rotated"
  new_password:
    type: string
    sensitive: true
    description: "The new password value to store as the latest secret version"
  disable_old_version:
    type: string
    default: "true"
    allowed-values:
      - "true"
      - "false"
    style: radio
    description: "Disable the previous secret version after rotation to prevent its use"

grains:
  first-approval:
    kind: shell
    condition:
      - type: approval
        message: 'This is a message to include in the approval request: supports liquid'
        channels:
          - type: user
            users:
              - johnathan.v@quali.com
    spec:
      agent:
        name: '{{ .inputs.agent }}'
      activities:
        deploy:
          commands:
            - echo first-approval

  second-approval:
    kind: shell
    depends-on: first-approval
    condition:
      - type: approval
        message: 'This is a message to include in the approval request: supports liquid'
        channels:
          - type: group
            groups:
              - Second-Approvers
    spec:
      agent:
        name: '{{ .inputs.agent }}'
      activities:
        deploy:
          commands:
            - echo second-approval

  rotate-secret:
    kind: shell
    depends-on: second-approval
    condition:
      - type: approval
        message: 'This is a message to include in the approval request: supports liquid'
        channels:
          # - type: group
          #   groups:
          #     - devops-group
          - type: user
            users: {{ .params.approvers }}
    spec:
      agent:
        name: '{{ .inputs.agent }}'
      files:
        - source: bps
          path: scripts/azure-keyvault/rotate.sh
      activities:
        deploy:
          commands:
            - name: rotate
              command: source rotate.sh
      env-vars:
        - KEYVAULT_NAME: '{{ .inputs.keyvault_name }}'
        - SECRET_NAME: '{{ .inputs.secret_name }}'
        - NEW_PASSWORD: '{{ .inputs.new_password }}'
        - DISABLE_OLD_VERSION: '{{ .inputs.disable_old_version }}'
