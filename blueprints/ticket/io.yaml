spec_version: 2

outputs:
  out:
    value: '{{ .grains.io.outputs.out }}'
  requester_name:
    value: '{{ .grains.get_requester_name.activities.deploy.commands.get_requester.outputs.requester_name }}'

grains:
  io:
    kind: terraform
    spec:
      source:
        store: bps
        path: terraform/input-as-output
      agent:
        name: vido-vido-prod
      inputs:
        - in: 'in'
      outputs:
        - out
  get_requester_name:
    kind: shell
    spec:
      agent:
        name: vido-vido-prod
      activities:
        deploy:
          commands:
            - name: get_requester
              command: export requester_name=vido
              outputs:
                - requester_name
