spec_version: 2
description: Deploy a simple EC2 instance using the terraform-aws-modules/ec2-instance registry module

inputs:
  agent:
    type: agent
  instance_name:
    type: string
    default: "torque-ec2"
    description: "Name tag for the EC2 instance"
  instance_type:
    type: string
    default: "t3.micro"
    description: "EC2 instance type"
  subnet_id:
    type: string
    description: "Subnet ID to launch the instance in"

outputs:
  instance_id:
    value: '{{ .grains.ec2.outputs.instance_id }}'
  public_ip:
    value: '{{ .grains.ec2.outputs.public_ip }}'
    kind: regular
  private_ip:
    value: '{{ .grains.ec2.outputs.private_ip }}'

grains:
  ec2:
    kind: terraform
    spec:
      source:
        store: bps
        path: terraform/ec2-simple
      agent:
        name: '{{ .inputs.agent }}'
      inputs:
        - instance_name: '{{ .inputs.instance_name }}'
        - instance_type: '{{ .inputs.instance_type }}'
        - subnet_id: '{{ .inputs.subnet_id }}'
      outputs:
        - instance_id
        - public_ip
        - private_ip
